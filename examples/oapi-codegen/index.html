<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>catto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            navy:    '#1a1a2e',
            panel:   '#16213e',
            crimson: '#e94560',
            muted:   '#8888aa',
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
</head>
<body class="font-mono bg-navy text-gray-200 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-crimson text-2xl font-bold uppercase tracking-widest mb-1">catto</h1>
    <p class="text-muted text-sm mb-8">find out what cat you deserve</p>
    <input
      type="text"
      placeholder="enter your name"
      name="name"
      class="w-full px-4 py-3 font-mono text-base bg-panel border-2 border-crimson text-gray-200 outline-none focus:ring-2 focus:ring-crimson/40"
      hx-get="/fragment"
      hx-trigger="keyup[key=='Enter']"
      hx-target="#result"
      hx-swap="innerHTML"
      autofocus
    >
    <p class="text-muted text-xs mt-2">press ↵ to reveal your cat</p>
    <div id="result" class="mt-8"></div>
  </div>
</body>
</html>
