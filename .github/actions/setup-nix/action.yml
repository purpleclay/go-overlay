name: Setup Nix
description: Install Nix and optionally configure Cachix

inputs:
  github-token:
    description: "GitHub token passed to install-nix-action"
    required: false
  cachix-token:
    description: "Cachix auth token. If provided, Cachix is configured"
    required: false
  push-to-cachix:
    description: "Whether to push store paths to Cachix"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31
      with:
        github_access_token: ${{ inputs.github-token }}

    - name: Setup Cachix
      if: inputs.cachix-token != ''
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
      with:
        name: go-overlay
        authToken: ${{ inputs.cachix-token }}
        skipPush: ${{ inputs.push-to-cachix != 'true' }}
        useDaemon: false
