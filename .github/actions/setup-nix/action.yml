name: Setup Nix
description: Install Nix and optionally configure Cachix

inputs:
  github-token:
    description: "GitHub token passed to install-nix-action"
    required: false
  cachix-token:
    description: "Cachix auth token. If provided, Cachix is configured"
    required: false
  push-to-cachix:
    description: "Whether to push store paths to Cachix"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
      with:
        github_access_token: ${{ inputs.github-token }}

    - name: Setup Cachix
      if: inputs.cachix-token != ''
      uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
      with:
        name: go-overlay
        authToken: ${{ inputs.cachix-token }}
        skipPush: ${{ inputs.push-to-cachix != 'true' }}
        useDaemon: false
