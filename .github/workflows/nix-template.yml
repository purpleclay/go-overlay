name: nix-template
on:
  push:
    branches:
      - main
    paths:
      - "flake.nix"
      - "flake.lock"
      - "builder/**"
      - "templates/**"
  pull_request:
    branches:
      - main
    paths:
      - "flake.nix"
      - "flake.lock"
      - "builder/**"
      - "templates/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  template-default:
    runs-on: ${{ matrix.os }}
    name: template / default / ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.GH_CACHIX }}

      - name: Scaffold default template
        run: nix flake new -t .#default /tmp/go-overlay-template

      - name: Build default template
        run: nix build --override-input go-overlay path:${{ github.workspace }} /tmp/go-overlay-template

      - name: Verify default template dev shell
        run: nix develop --override-input go-overlay path:${{ github.workspace }} /tmp/go-overlay-template --command go version

  template-workspace:
    runs-on: ${{ matrix.os }}
    name: template / workspace / ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.GH_CACHIX }}

      - name: Scaffold workspace template
        run: nix flake new -t .#workspace /tmp/go-overlay-workspace-template

      - name: Build workspace template
        run: nix build --override-input go-overlay path:${{ github.workspace }} /tmp/go-overlay-workspace-template

      - name: Verify workspace template dev shell
        run: nix develop --override-input go-overlay path:${{ github.workspace }} /tmp/go-overlay-workspace-template --command go version

  template-image:
    runs-on: ubuntu-24.04
    name: template / image / ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.GH_CACHIX }}

      - name: Scaffold image template
        run: nix flake new -t .#image /tmp/go-overlay-image-template

      - name: Build image template binary
        run: nix build --override-input go-overlay path:${{ github.workspace }} /tmp/go-overlay-image-template

      - name: Build image template container image
        run: nix build --override-input go-overlay path:${{ github.workspace }} /tmp/go-overlay-image-template#image

      - name: Verify image template dev shell
        run: nix develop --override-input go-overlay path:${{ github.workspace }} /tmp/go-overlay-image-template --command go version
