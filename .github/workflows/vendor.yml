name: govendor
on:
  pull_request:
    branches: [main]
    paths: ["**/go.mod", "**/go.sum"]

jobs:
  detect:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      dirs: ${{ steps.detect.outputs.dirs }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect changed module directories
        id: detect
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          dirs=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | awk '/(^|\/)go\.(mod|sum)$/{print}' \
            | xargs -r -n1 dirname | sort -u)

          {
            echo "dirs<<EOF"
            echo "$dirs"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

  vendor:
    needs: detect
    if: needs.detect.outputs.dirs != ''
    permissions:
      contents: read
    uses: ./.github/workflows/govendor-update.yml
    with:
      working-directory: ${{ needs.detect.outputs.dirs }}
    secrets:
      token: ${{ secrets.GH_NSV }}
      gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
      gpg-passphrase: ${{ secrets.GPG_PASSPHRASE }}
