name: nix-tools
on:
  push:
    branches:
      - main
    paths:
      - "manifests/delve/**"
      - "manifests/gofumpt/**"
      - "manifests/golangci-lint/**"
      - "manifests/gopls/**"
      - "manifests/govulncheck/**"
      - "manifests/staticcheck/**"
      - "lib/tool-manifests.nix"
      - "lib/mk-go-tool.nix"
      - "lib/mk-tool-set.nix"
  pull_request:
    branches:
      - main
    paths:
      - "manifests/delve/**"
      - "manifests/gofumpt/**"
      - "manifests/golangci-lint/**"
      - "manifests/gopls/**"
      - "manifests/govulncheck/**"
      - "manifests/staticcheck/**"
      - "lib/tool-manifests.nix"
      - "lib/mk-go-tool.nix"
      - "lib/mk-tool-set.nix"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-24.04
    name: detect changes
    outputs:
      tools: ${{ steps.filter.outputs.tools }}
      has-tools: ${{ steps.filter.outputs.has-tools }}
      shared: ${{ steps.changes.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Generate filters
        id: gen-filters
        run: |
          tools='["delve","gofumpt","golangci-lint","gopls","govulncheck","staticcheck"]'

          filters="shared:"
          filters="$filters
            - 'lib/tool-manifests.nix'
            - 'lib/mk-go-tool.nix'
            - 'lib/mk-tool-set.nix'"
          for name in $(echo "$tools" | jq -r '.[]'); do
            filters="$filters
          ${name}:
            - 'manifests/${name}/**'"
          done

          {
            echo "filters<<EOF"
            echo "$filters"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "tools=$tools" >> "$GITHUB_OUTPUT"

      - name: Detect changed paths
        uses: dorny/paths-filter@9d7afb8d214ad99e78fbd4247752c4caed2b6e4c # v4
        id: changes
        with:
          filters: ${{ steps.gen-filters.outputs.filters }}

      - name: Filter changed tools
        id: filter
        run: |
          all_tools='${{ steps.gen-filters.outputs.tools }}'
          changes='${{ steps.changes.outputs.changes }}'
          shared=$(echo "$changes" | jq 'any(. == "shared")')

          if [ "$shared" == "true" ]; then
            tools="$all_tools"
          else
            tools=$(echo "$all_tools" | jq -c --argjson changes "$changes" \
              '[.[] | select(. as $n | $changes | any(. == $n))]')
          fi

          echo "tools=$tools" >> "$GITHUB_OUTPUT"
          echo "has-tools=$(echo "$tools" | jq 'length > 0')" >> "$GITHUB_OUTPUT"

  build:
    needs: detect-changes
    if: needs.detect-changes.outputs.has-tools == 'true'
    runs-on: ${{ matrix.os }}
    name: build / ${{ matrix.tool }} / ${{ matrix.os }}
    strategy:
      matrix:
        tool: ${{ fromJSON(needs.detect-changes.outputs.tools) }}
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.GH_CACHIX }}
          push-to-cachix: "true"

      - name: Build ${{ matrix.tool }}
        run: nix build '.#go.tools.${{ matrix.tool }}.latest'

  build-with-default-tools:
    needs: detect-changes
    if: needs.detect-changes.outputs.shared == 'true'
    runs-on: ${{ matrix.os }}
    name: build / withDefaultTools / ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.GH_CACHIX }}
          push-to-cachix: "true"

      - name: Build withDefaultTools
        run: nix build '.#go.withDefaultTools'
