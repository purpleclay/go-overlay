name: govendor-update
on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory (or newline-separated list of directories) for govendor manifest generation"
        required: false
        type: string
        default: "."
      co-author:
        description: "Co-author for the commit trailer (e.g., 'name <email>'). If not provided, uses git config from GPG import"
        required: false
        type: string
    secrets:
      token:
        description: "GitHub token with contents:write and workflows:write permissions to push commits"
        required: true
      gpg-private-key:
        description: "GPG private key for signing commits"
        required: true
      gpg-passphrase:
        description: "Passphrase for the GPG private key"
        required: true

jobs:
  govendor:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 2
          token: ${{ secrets.token }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: GPG Import
        uses: purpleclay/gpg-import-action@a39506c3eff9b02459e033e3551e556934f266fc # v0
        with:
          key: ${{ secrets.gpg-private-key }}
          passphrase: ${{ secrets.gpg-passphrase }}

      - name: Update govendor.toml
        env:
          CO_AUTHOR: ${{ inputs.co-author }}
          DIRS: ${{ inputs.working-directory }}
        run: |
          changed=0
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::govendor ($dir)"
            (cd "$dir" && nix run github:purpleclay/go-overlay#govendor) || {
              echo "::error::govendor failed for $dir"
              exit 1
            }
            echo "::endgroup::"

            if ! git diff --quiet -- "$dir/govendor.toml"; then
              git add "$dir/govendor.toml"
              changed=1
            fi
          done <<< "$DIRS"

          if [ "$changed" -eq 0 ]; then
            echo "No changes to govendor.toml"
            exit 0
          fi

          if [ -z "$CO_AUTHOR" ]; then
            CO_AUTHOR="$(git config user.name) <$(git config user.email)>"
          fi

          git commit --amend --no-edit --trailer "Co-authored-by: $CO_AUTHOR"
          git push --force-with-lease
