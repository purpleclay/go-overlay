name: nix-checks
on:
  push:
    branches:
      - main
      - govendor-resolution-performance
    paths:
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - "lib/**"
      - "builder/**"
      - "test/**"
      - "examples/**"
      - "govendor.toml"
  pull_request:
    branches:
      - main
      - govendor-resolution-performance
    paths:
      - "flake.nix"
      - "flake.lock"
      - "default.nix"
      - "lib/**"
      - "builder/**"
      - "test/**"
      - "examples/**"
      - "govendor.toml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ${{ matrix.os }}
    name: checks / ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          cachix-token: ${{ secrets.GH_CACHIX }}

      - name: Run all checks
        run: nix flake check
