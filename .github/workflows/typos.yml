name: typos
on:
  push:
    branches:
      - main
    paths-ignore:
      - "LICENSE"
      - ".github/stale.yml"
      - ".github/renovate.json"
      - ".github/CODEOWNERS"
      - ".zed/**"
      - "manifests/**"
      - "CODE_OF_CONDUCT.md"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "LICENSE"
      - ".github/stale.yml"
      - ".github/renovate.json"
      - ".github/CODEOWNERS"
      - ".zed/**"
      - "manifests/**"
      - "CODE_OF_CONDUCT.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typos:
    runs-on: ubuntu-24.04
    if: github.actor != 'renovate[bot]'
    name: check spelling
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-token: ${{ secrets.GH_CACHIX }}

      - name: Run Typos
        run: nix develop -c typos
