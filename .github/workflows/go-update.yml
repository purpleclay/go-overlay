name: go-update
on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  go-update:
    runs-on: ubuntu-24.04
    name: go-update
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_NSV }}

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-token: ${{ secrets.GH_CACHIX }}

      - name: Detect Latest Go Versions
        run: |
          LATEST=$(nix run .#goscrape -- detect)
          PREV_MINOR="1.$(($(echo "$LATEST" | cut -d. -f2) - 1))"
          PREV=$(nix run .#goscrape -- detect "$PREV_MINOR")
          echo "GO_VERSIONS=$LATEST $PREV" >> $GITHUB_ENV

      - name: GPG Import
        env:
          GPG_PRIVATE_KEY: "${{ secrets.GPG_PRIVATE_KEY }}"
          GPG_PASSPHRASE: "${{ secrets.GPG_PASSPHRASE }}"
        run: nix run github:purpleclay/gpg-import

      - name: Generate Manifests and Create PRs
        env:
          GITHUB_TOKEN: ${{ secrets.GH_NSV }}
        run: |
          for version in ${{ env.GO_VERSIONS }}; do
            manifest="manifests/go/${version}.nix"

            if [ -f "$manifest" ]; then
              echo "Manifest already exists for ${version}"
              continue
            fi

            branch="nix-go-${version}"

            # Skip if a PR already exists for this version
            if gh pr list --head "$branch" --state open --json number --jq 'length' | grep -q '[1-9]'; then
              echo "PR already exists for ${version}"
              continue
            fi

            nix run .#goscrape -- generate "$version" --output manifests/go

            git checkout -b "$branch"
            git add "$manifest"
            git commit -s -m "chore: generated nix manifest for go release ${version}"
            git push -u origin "$branch"

            gh pr create \
              --title "chore: add go ${version} manifest" \
              --body "Auto-generated nix manifest for Go release ${version}." \
              --base main \
              --head "$branch"

            gh pr merge --auto --squash "$branch"

            # Return to main for the next version
            git checkout main
          done
