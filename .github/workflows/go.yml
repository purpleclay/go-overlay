name: go
on:
  push:
    branches:
      - main
      - govendor-resolution-performance
    paths:
      - "**.go"
      - "go.mod"
  pull_request:
    branches:
      - main
      - govendor-resolution-performance
    paths:
      - "**.go"
      - "go.mod"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
jobs:
  golangci-lint:
    runs-on: ubuntu-24.04
    if: github.actor != 'renovate[bot]'
    name: golangci-lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-token: ${{ secrets.GH_CACHIX }}
          push-to-cachix: "true"

      - name: Lint
        run: nix develop -c golangci-lint run

  test:
    runs-on: ubuntu-24.04
    name: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-token: ${{ secrets.GH_CACHIX }}
          push-to-cachix: "true"

      - name: Run tests
        run: nix develop -c go test -short -race -vet=off -shuffle=on ./...

  build:
    runs-on: ubuntu-24.04
    name: build
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-token: ${{ secrets.GH_CACHIX }}
          push-to-cachix: "true"

      - name: Build
        run: nix develop -c go build ./...
